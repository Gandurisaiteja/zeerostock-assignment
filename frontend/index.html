<!DOCTYPE html>
<html>
<head>
  <title>Inventory Search</title>
  <link rel="stylesheet" href="style.css">
 
  <script src="https://kit.fontawesome.com/f0f9109da1.js" crossorigin="anonymous"></script>
</head>
<body>

  <div class="container">
    <h1>Inventory Search</h1>

    <div class="search-box">
        <div class="input-group">
        <i class="fa-solid fa-magnifying-glass icon"></i>
        <input id="q" placeholder="Search product" />
        </div>

            <div class="dropdown-group">
       
        <select id="category">
            <option value="">All Categories</option>
            <option>Electronics</option>
            <option>Furniture</option>
            <option>Stationery</option>
        </select>
        </div>

      <input id="minPrice" placeholder="Min Price" type="number" />
      <input id="maxPrice" placeholder="Max Price" type="number" />

      <button onclick="search()">Search</button>
    </div>

    <div id="status"></div>

    <div id="results" class="results"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
